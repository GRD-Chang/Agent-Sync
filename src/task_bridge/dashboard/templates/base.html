<!DOCTYPE html>
<html lang="{{ html_lang }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | task-bridge</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='/dashboard.css') }}">
  </head>
  <body>
    <a class="skip-link" href="#content">{{ ui.shell.skip_link }}</a>
    <div class="page-shell" data-testid="dashboard-shell">
      <header class="masthead">
        <div class="masthead-copy">
          <p class="eyebrow">{{ ui.shell.eyebrow }}</p>
          <h1>{{ ui.shell.title }}</h1>
          <p class="masthead-note">
            {{ ui.shell.note }}
          </p>
        </div>
        <aside class="masthead-aside" aria-label="Dashboard framing">
          <p class="aside-label">{{ ui.shell.scope_label }}</p>
          <p class="aside-body" data-testid="dashboard-boundary-note">{{ ui.shell.scope_note }}</p>
        </aside>
      </header>

      <nav class="top-nav" aria-label="{{ ui.shell.primary_nav_label }}" data-testid="dashboard-primary-nav">
        <ul>
          {% for item in nav_items %}
          <li>
            <a
              data-testid="dashboard-nav-{{ item.key }}"
              href="{{ item.href }}"
              {% if item.key == active_page %}aria-current="page"{% endif %}
            >{{ item.label }}</a>
          </li>
          {% endfor %}
        </ul>
      </nav>

      <main id="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
