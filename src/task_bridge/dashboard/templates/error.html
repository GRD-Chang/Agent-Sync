{% extends "base.html" %}

{% block content %}
<section class="placeholder-panel" aria-labelledby="error-title">
  <p class="eyebrow">{{ ui.nav[active_page] }}</p>
  <h2 id="error-title" data-testid="dashboard-page-title">{{ error_title }}</h2>
  <p>{{ error_body }}</p>
  <div class="state-panel error-state" role="alert" data-testid="{{ error_testid }}">
    <h3>{{ error_label }}</h3>
    <p>{{ error_message }}</p>
  </div>
</section>
{% endblock %}
