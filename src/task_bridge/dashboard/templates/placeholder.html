{% extends "base.html" %}

{% block content %}
<section class="placeholder-panel" aria-labelledby="placeholder-title" data-testid="dashboard-{{ active_page }}-shell">
  <p class="eyebrow">{{ page_title }}</p>
  <h2 id="placeholder-title" data-testid="dashboard-page-title">{{ placeholder_heading }}</h2>
  <p>{{ placeholder_copy }}</p>
  <div class="state-panel">
    <p class="eyebrow">{{ ui.placeholder.boundary_eyebrow }}</p>
    <h3>{{ ui.placeholder.boundary_title }}</h3>
    <p>{{ ui.placeholder.boundary_body }}</p>
  </div>
</section>
{% endblock %}
